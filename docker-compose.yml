services:
  backend:
    build: ./backend
    environment:
      DATA_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ACCESS_ALLOWLIST_FILE: /allowlist.json
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      BREAKGLASS_ADMIN_EMAIL: ${BREAKGLASS_ADMIN_EMAIL:-}
      BREAKGLASS_ADMIN_PASSWORD: ${BREAKGLASS_ADMIN_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./allowlist.json:/allowlist.json:ro

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
