name: Mirror to neolabel/app

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-neolabel-app
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Bare clone of source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo.git

      - name: Push branches and tags to neolabel/app
        working-directory: repo.git
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          # Mirror only branches and tags. Skip refs/pull/* and other
          # GitHub-internal refs that the target repo always rejects
          # ("deny updating a hidden ref"). --prune deletes refs on the
          # target that no longer exist in source.
          git push --prune --force \
            "https://x-access-token:${MIRROR_PAT}@github.com/neolabel/app.git" \
            "refs/heads/*:refs/heads/*" \
            "refs/tags/*:refs/tags/*"
