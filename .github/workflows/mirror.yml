name: Mirror to neolabel/app

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-neolabel-app
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Bare clone of source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo.git

      - name: Push mirror to neolabel/app
        working-directory: repo.git
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git push --mirror "https://x-access-token:${MIRROR_PAT}@github.com/neolabel/app.git"
