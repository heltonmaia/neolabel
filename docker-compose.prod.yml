services:
  backend:
    image: neo-label-backend:prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ACCESS_ALLOWLIST_FILE: /allowlist.json
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMERGENCY_ADMIN_EMAIL: ${EMERGENCY_ADMIN_EMAIL:-}
    volumes:
      - ${DATA_DIR:-/srv/neo-label/data}:/data
      - ./allowlist.json:/allowlist.json:ro
    expose:
      - "8000"

  frontend:
    image: neo-label-frontend:prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
